<!DOCTYPE html>
<html lang="da">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miks Glow Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020106] text-white font-sans p-6 selection:bg-blue-500/30">
    <div class="max-w-md mx-auto relative">
        <div class="fixed top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top_left,rgba(59,130,246,0.1),transparent_50%)] pointer-events-none"></div>

        <header class="flex justify-between items-center mb-12 relative z-10">

            </div>
            <div class="bg-white/5 border border-white/10 p-4 rounded-[2rem] backdrop-blur-xl shadow-2xl text-center">
                <p class="text-2xl font-black text-blue-400 leading-none">18°</p>
                <p class="text-[8px] opacity-40 uppercase font-black mt-1">Shorts</p>

        </header>

        <section class="space-y-4 relative z-10">
            <h2 class="text-[10px] font-black tracking-[0.5em] text-white/20 uppercase italic mb-6">Dagens Protokol</h2>
            
            <div class="bg-white/[0.03] border border-white/5 border-l-4 border-slate-400 p-6 rounded-[2.5rem] backdrop-blur-3xl flex justify-between items-center">
                <div><p class="font-bold text-lg">Opsamling: Transport</p><p class="text-[10px] opacity-30 uppercase italic">Klausdalsbrov. 275</p></div>
                <div class="text-right font-black text-2xl italic tracking-tighter">09:22</div>
            </div>

            <div class="bg-white/[0.03] border border-white/5 border-l-4 border-blue-500 p-6 rounded-[2.5rem] backdrop-blur-3xl flex justify-between items-center">
                <div><p class="font-bold text-lg text-blue-400">Samtale: Dorte L</p><p class="text-[10px] opacity-30 uppercase italic">Rigshospitalet</p></div>
                <div class="text-right font-black text-2xl italic tracking-tighter text-blue-400">11:00</div>
            </div>

            <div class="bg-white/[0.03] border border-white/5 border-l-4 border-red-500 p-6 rounded-[2.5rem] backdrop-blur-3xl flex justify-between items-center opacity-70">
                <div><p class="font-bold text-lg">Dialyse (Fredag)</p><p class="text-[10px] opacity-30 uppercase italic">Klinik 8601</p></div>
                <div class="text-right font-black text-2xl italic tracking-tighter">08:00</div>
            </div>
        </section>

        <div class="mt-12 p-6 rounded-[2.5rem] bg-gradient-to-br from-yellow-500/10 to-transparent border border-yellow-500/10 flex justify-between items-center backdrop-blur-md relative z-10">
            <div>
               <p class="text-[8px] font-black uppercase tracking-[0.2em] text-yellow-500/60 mb-1 italic text-yellow-500">Superliga</p>
               <p class="text-3xl font-black italic tracking-tighter">6. PLADS</p>
            </div>
            <div class="w-14 h-14 bg-yellow-500 rounded-[1.2rem] flex items-center justify-center text-black font-black italic text-xl shadow-lg shadow-yellow-500/20">BIF</div>
        </div>
    </div>

</html>
